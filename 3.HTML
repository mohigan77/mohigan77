<p>먼치킨고양이는 다리가 짧은 고양이로
다른 고양이에 비해 아주 짧고 또 허리가 긴것이 특징이랍니다.

사람들도 엄청 잘 따르고 금방 친해져요.
또한 생긴것도 날렵한 노르웨이숲이나 러시안블루와는 달리
동글동글 귀엽답니다.
애기가 다리길이가 아무래도 짧기때문에 높은곳에 뛰어내리거나 올라가기
조금 어려워해요. 하지만 우다다다 빠르게 달리는 장점이 있답니다.
